<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>管理后台 · AI 移动安全扫描器</title>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  <script>(()=>{const t=localStorage.getItem('appsec-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})()</script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #f1f5f9; color: #1e293b; min-height: 100vh; }

    /* ── Login ───────────────────────────────────── */
    .login-wrap { display: flex; align-items: center; justify-content: center;
                  min-height: 100vh; padding: 20px; }
    .login-card { background: white; border-radius: 16px; padding: 40px 36px;
                  width: 100%; max-width: 380px;
                  box-shadow: 0 8px 32px rgba(0,0,0,.1); }
    .login-logo  { display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
    .login-title { text-align: center; font-size: 1.25em; font-weight: 800; margin-bottom: 2px; }
    .login-sub   { text-align: center; font-size: .84em; color: #64748b; margin-bottom: 28px; }

    /* ── Form shared ────────────────────────────── */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: .78em; font-weight: 700; color: #475569;
                   margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
    .field input, .field select, .field textarea {
      width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px;
      padding: 9px 12px; font-size: .92em; outline: none;
      transition: border-color .15s; background: white; color: #1e293b; }
    .field input:focus, .field select:focus { border-color: #2563eb; }
    .field-hint { font-size: .74em; color: #94a3b8; margin-top: 4px; }
    .err-msg { color: #dc2626; font-size: .82em; margin-top: 8px; min-height: 18px; }

    /* ── Buttons ────────────────────────────────── */
    .btn { display: inline-flex; align-items: center; justify-content: center;
           padding: 9px 18px; background: #2563eb; color: white; border: none;
           border-radius: 8px; font-size: .9em; font-weight: 600; cursor: pointer;
           transition: background .15s; white-space: nowrap; }
    .btn:hover   { background: #1d4ed8; }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-full  { width: 100%; }
    .btn-sm    { padding: 5px 12px; font-size: .8em; }
    .btn-ghost { background: transparent; color: #64748b; border: 1.5px solid #e2e8f0; }
    .btn-ghost:hover { background: #f8fafc; }
    .btn-outline { background: transparent; color: #2563eb; border: 1.5px solid #2563eb; }
    .btn-outline:hover { background: #eff6ff; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }

    /* ── Top nav ────────────────────────────────── */
    nav.topnav { background: rgba(5,11,24,.6); color: white; display: flex; align-items: center;
                 padding: 0 24px; height: 54px; gap: 16px;
                 position: sticky; top: 0; z-index: 100;
                 backdrop-filter: blur(28px) saturate(180%);
                 -webkit-backdrop-filter: blur(28px) saturate(180%);
                 border-bottom: 1px solid rgba(255,255,255,.07);
                 box-shadow: 0 1px 0 rgba(255,255,255,.04), 0 8px 32px rgba(0,0,0,.18); }
    [data-theme=light] nav.topnav { background: rgba(255,255,255,.65)!important; color: #0f172a!important;
                 border-bottom-color: rgba(0,0,0,.06)!important;
                 box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 32px rgba(0,0,0,.06)!important; }
    [data-theme=light] nav.topnav .nav-badge { background: rgba(0,0,0,.07); color: #475569; }
    [data-theme=light] nav.topnav .nav-logout { background: rgba(0,0,0,.06); color: #334155; border: 1px solid rgba(0,0,0,.08); }
    [data-theme=light] nav.topnav .nav-logout:hover { background: rgba(0,0,0,.1); }
    .nav-brand { font-weight: 800; font-size: 1em; flex: 1;
                 display: flex; align-items: center; gap: 8px; }
    .nav-badge { background: rgba(255,255,255,.12); border-radius: 4px;
                 padding: 2px 8px; font-size: .72em; font-weight: 600;
                 color: rgba(255,255,255,.7); }
    .nav-logout { padding: 5px 14px; background: rgba(255,255,255,.1); border: none;
                  color: rgba(255,255,255,.85); border-radius: 6px; cursor: pointer;
                  font-size: .82em; transition: background .15s; }
    .nav-logout:hover { background: rgba(255,255,255,.2); }

    /* ── Tabs ────────────────────────────────────── */
    .tabs-bar { background: white; border-bottom: 1px solid #e2e8f0;
                padding: 0 24px; display: flex; gap: 0; overflow-x: auto; }
    .tab-btn { padding: 14px 20px; font-size: .88em; font-weight: 500; color: #64748b;
               cursor: pointer; border: none; background: none;
               border-bottom: 2.5px solid transparent; margin-bottom: -1px;
               transition: all .15s; white-space: nowrap; }
    .tab-btn:hover  { color: #2563eb; }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; font-weight: 700; }

    /* ── Main content ───────────────────────────── */
    .content { max-width: 1200px; margin: 0 auto; padding: 28px 24px; }
    .hidden  { display: none !important; }

    /* ── Stat cards ─────────────────────────────── */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                  gap: 14px; margin-bottom: 20px; }
    .stat-card  { background: white; border-radius: 12px; padding: 20px 22px;
                  box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .stat-label { font-size: .72em; font-weight: 700; color: #94a3b8;
                  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .stat-val   { font-size: 2em; font-weight: 800; color: #1e293b; line-height: 1; }
    .stat-sub   { font-size: .74em; color: #64748b; margin-top: 4px; }

    /* ── Cards ───────────────────────────────────── */
    .card       { background: white; border-radius: 12px; padding: 24px;
                  box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .card-title { font-size: 1em; font-weight: 700; margin-bottom: 20px;
                  display: flex; align-items: center; justify-content: space-between; }
    .card-title span { font-size: .78em; font-weight: 400; color: #64748b; }

    /* ── Generate layout ────────────────────────── */
    .gen-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 720px) { .gen-layout { grid-template-columns: 1fr; } }
    .form-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; }
    .form-grid .full { grid-column: 1 / -1; }

    /* ── Result area ────────────────────────────── */
    .result-area { background: #f8fafc; border: 1.5px dashed #cbd5e1; border-radius: 10px;
                   padding: 14px; min-height: 120px; max-height: 340px; overflow-y: auto; }
    .result-empty { color: #94a3b8; font-size: .88em; text-align: center; padding: 28px 0; }
    .code-item  { display: flex; align-items: center; gap: 8px; padding: 6px 0;
                  border-bottom: 1px solid #e2e8f0; }
    .code-item:last-child { border-bottom: none; }
    .code-text  { font-family: 'Courier New', monospace; font-weight: 700;
                  font-size: .93em; color: #1e293b; flex: 1; letter-spacing: .06em; }
    .copy-btn   { padding: 3px 10px; cursor: pointer; background: #e2e8f0; border: none;
                  border-radius: 4px; color: #475569; font-size: .75em; }
    .copy-btn:hover  { background: #cbd5e1; }
    .copy-btn.copied { background: #dcfce7; color: #16a34a; }
    .result-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

    /* ── Table ───────────────────────────────────── */
    .table-toolbar { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
    .search-input  { flex: 1; min-width: 180px; border: 1.5px solid #e2e8f0;
                     border-radius: 8px; padding: 7px 12px; font-size: .87em; outline: none; }
    .search-input:focus { border-color: #2563eb; }
    .filter-sel    { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 7px 10px;
                     font-size: .87em; outline: none; cursor: pointer; background: white; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .84em; }
    th    { text-align: left; padding: 9px 12px; background: #f8fafc;
            font-weight: 700; font-size: .74em; text-transform: uppercase;
            letter-spacing: .05em; color: #64748b; border-bottom: 1px solid #e2e8f0;
            white-space: nowrap; }
    td    { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }
    .code-cell { font-family: 'Courier New', monospace; font-weight: 700;
                 letter-spacing: .05em; font-size: .9em; color: #1e293b; }

    /* ── Status badges ───────────────────────────── */
    .badge         { display: inline-block; padding: 2px 8px; border-radius: 4px;
                     font-size: .74em; font-weight: 700; }
    .badge-active  { background: #dcfce7; color: #15803d; }
    .badge-used    { background: #fef3c7; color: #b45309; }
    .badge-expired { background: #fee2e2; color: #dc2626; }
    .badge-revoked { background: #f1f5f9; color: #94a3b8; }

    /* ── Pagination ─────────────────────────────── */
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 14px;
                  justify-content: flex-end; font-size: .84em; color: #64748b;
                  flex-wrap: wrap; }
    .page-btn { padding: 5px 12px; border: 1.5px solid #e2e8f0; border-radius: 6px;
                cursor: pointer; background: white; font-size: .84em; }
    .page-btn:hover    { background: #f1f5f9; }
    .page-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Toast ──────────────────────────────────── */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(8px);
             background: rgba(15,23,42,.92); border: 1px solid rgba(255,255,255,.1);
             color: #f1f5f9; backdrop-filter: blur(16px) saturate(180%);
             -webkit-backdrop-filter: blur(16px) saturate(180%);
             padding: 12px 28px; border-radius: 40px; font-size: .87em; font-weight: 600;
             box-shadow: 0 8px 32px rgba(0,0,0,.35), 0 2px 8px rgba(0,0,0,.2);
             z-index: 9999; pointer-events: none; white-space: nowrap;
             opacity: 0; transition: opacity .25s, transform .25s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    [data-theme=light] .toast { background: rgba(255,255,255,.92); border-color: rgba(0,0,0,.1);
             color: #0f172a; box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 2px 8px rgba(0,0,0,.07); }

    /* ── Misc ───────────────────────────────────── */
    .refresh-row { display: flex; justify-content: flex-end; margin-top: 8px; }

    /* ── Nav user ───────────────────────────────── */
    .nav-user { display: flex; align-items: center; gap: 9px; margin-right: 6px; }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: .8em; font-weight: 800; color: white; flex-shrink: 0;
      text-transform: uppercase; letter-spacing: .02em;
    }
    .nav-uname { font-size: .84em; color: rgba(255,255,255,.85);
                 max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Settings layout ────────────────────────── */
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 780px) { .settings-grid { grid-template-columns: 1fr; } }
    .settings-grid .full-col { grid-column: 1 / -1; }

    /* ── Account table ──────────────────────────── */
    .acct-row { display: flex; align-items: center; gap: 10px; padding: 10px 0;
                border-bottom: 1px solid #f1f5f9; }
    .acct-row:last-child { border-bottom: none; }
    .acct-avatar { width: 36px; height: 36px; border-radius: 50%;
                   background: linear-gradient(135deg, #3b82f6, #8b5cf6);
                   display: flex; align-items: center; justify-content: center;
                   font-size: .8em; font-weight: 800; color: white;
                   text-transform: uppercase; flex-shrink: 0; }
    .acct-info { flex: 1; min-width: 0; }
    .acct-name { font-weight: 700; font-size: .9em; }
    .acct-meta { font-size: .74em; color: #94a3b8; margin-top: 2px; }
    .badge-super { background: #fef3c7; color: #b45309; padding: 1px 7px;
                   border-radius: 4px; font-size: .7em; font-weight: 700; margin-left: 6px; }

    /* ── Theme toggle ────────────────────────────── */
    .theme-btn { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
                 width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center;
                 justify-content: center; color: rgba(255,255,255,.7); transition: all .2s; flex-shrink: 0; }
    .theme-btn:hover { background: rgba(255,255,255,.2); color: white; }

    /* ── Dark mode ───────────────────────────────── */
    [data-theme=dark] body { background: #0f172a; color: #e2e8f0; }
    [data-theme=dark] .login-card { background: #1e293b; box-shadow: 0 8px 32px rgba(0,0,0,.5); }
    [data-theme=dark] .login-title { color: #f1f5f9; }
    [data-theme=dark] .login-sub { color: #64748b; }
    [data-theme=dark] .field label { color: #94a3b8; }
    [data-theme=dark] .field input, [data-theme=dark] .field select, [data-theme=dark] .field textarea {
      background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); color: #e2e8f0; }
    [data-theme=dark] .field input:focus, [data-theme=dark] .field select:focus { border-color: #3b82f6; }
    [data-theme=dark] .field-hint { color: #475569; }
    [data-theme=dark] .err-msg { color: #f87171; }
    [data-theme=dark] .btn-ghost { background: transparent; color: #94a3b8; border-color: rgba(255,255,255,.15); }
    [data-theme=dark] .btn-ghost:hover { background: rgba(255,255,255,.06); }
    [data-theme=dark] .btn-outline { background: transparent; color: #60a5fa; border-color: rgba(59,130,246,.5); }
    [data-theme=dark] .btn-outline:hover { background: rgba(59,130,246,.1); }
    [data-theme=dark] .tabs-bar { background: #1e293b; border-bottom-color: rgba(255,255,255,.08); }
    [data-theme=dark] .tab-btn { color: #64748b; }
    [data-theme=dark] .tab-btn:hover { color: #60a5fa; }
    [data-theme=dark] .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    [data-theme=dark] .stat-card { background: #1e293b; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
    [data-theme=dark] .stat-label { color: #64748b; }
    [data-theme=dark] .stat-val { color: #f1f5f9; }
    [data-theme=dark] .stat-sub { color: #475569; }
    [data-theme=dark] .card { background: #1e293b; box-shadow: 0 1px 4px rgba(0,0,0,.4); }
    [data-theme=dark] .card-title { color: #f1f5f9; }
    [data-theme=dark] .card-title span { color: #64748b; }
    [data-theme=dark] .result-area { background: #0f172a; border-color: rgba(255,255,255,.12); }
    [data-theme=dark] .result-empty { color: #475569; }
    [data-theme=dark] .code-item { border-bottom-color: rgba(255,255,255,.08); }
    [data-theme=dark] .code-text { color: #e2e8f0; }
    [data-theme=dark] .copy-btn { background: rgba(255,255,255,.1); color: #94a3b8; }
    [data-theme=dark] .copy-btn:hover { background: rgba(255,255,255,.16); }
    [data-theme=dark] .copy-btn.copied { background: rgba(16,185,129,.2); color: #34d399; }
    [data-theme=dark] .search-input { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); color: #e2e8f0; }
    [data-theme=dark] .search-input:focus { border-color: #3b82f6; }
    [data-theme=dark] .filter-sel { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); color: #e2e8f0; }
    [data-theme=dark] th { background: rgba(255,255,255,.04); color: #64748b; border-bottom-color: rgba(255,255,255,.08); }
    [data-theme=dark] td { border-bottom-color: rgba(255,255,255,.06); color: #e2e8f0; }
    [data-theme=dark] tr:hover td { background: rgba(255,255,255,.03); }
    [data-theme=dark] .code-cell { color: #e2e8f0; }
    [data-theme=dark] .page-btn { background: rgba(255,255,255,.06); border-color: rgba(255,255,255,.12); color: #94a3b8; }
    [data-theme=dark] .page-btn:hover { background: rgba(255,255,255,.1); }
    [data-theme=dark] .acct-row { border-bottom-color: rgba(255,255,255,.06); }
    [data-theme=dark] .theme-btn { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.7); }
    [data-theme=light] .theme-btn { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.12); color: #64748b; }
    [data-theme=light] .theme-btn:hover { background: rgba(0,0,0,.08); color: #1e293b; }

    /* ── Lang toggle ─────────────────────────────── */
    .lang-toggle { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2); border-radius: 8px;
                   height: 30px; padding: 0 10px; cursor: pointer; font-size: .78em; font-weight: 700;
                   color: rgba(255,255,255,.8); transition: all .2s; flex-shrink: 0; white-space: nowrap; }
    .lang-toggle:hover { background: rgba(255,255,255,.2); }
    [data-theme=light] .lang-toggle { background: rgba(0,0,0,.05); border-color: rgba(0,0,0,.12); color: #64748b; }
    [data-theme=light] .lang-toggle:hover { background: rgba(0,0,0,.08); }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════ LOGIN ══ -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-logo"><svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:48px"><defs><linearGradient id="alg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs><rect width="32" height="32" rx="7" fill="url(#alg)"/><path d="M16 5.5 L25 9.5 L25 18 C25 23.5 21.5 27.5 16 29 C10.5 27.5 7 23.5 7 18 L7 9.5 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5" stroke-linejoin="round"/><rect x="10" y="17" width="12" height="1.5" rx="0.75" fill="#22d3ee"/></svg></div>
    <div class="login-title" data-i18n="loginTitle">管理后台</div>
    <div class="login-sub">AI 移动安全扫描器</div>
    <div class="field">
      <label data-i18n="loginLabelUser">用户名</label>
      <input type="text" id="login-user" autocomplete="username" value="admin">
    </div>
    <div class="field">
      <label data-i18n="loginLabelPass">密码</label>
      <input type="password" id="login-pass" autocomplete="current-password"
             placeholder="••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="err-msg" id="login-err"></div>
    <button class="btn btn-full" id="login-btn" style="margin-top:6px" onclick="doLogin()" data-i18n="btnLogin">
      登录
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════ PANEL ══ -->
<div id="admin-panel" class="hidden">

  <!-- Top nav -->
  <nav class="topnav">
    <div class="nav-brand" style="display:flex;align-items:center;gap:7px">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:18px;height:18px"><path d="M10 2 L17.5 6 L17.5 12 C17.5 16 14 19 10 20 C6 19 2.5 16 2.5 12 L2.5 6 Z" fill="#6366f1"/><rect x="5.5" y="11.5" width="9" height="1.2" rx="0.6" fill="#22d3ee"/></svg>
      AI Scanner
      <span class="nav-badge" data-i18n="adminBadge">管理后台</span>
    </div>
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">A</div>
      <span class="nav-uname" id="nav-uname">admin</span>
    </div>
    <button class="nav-logout" data-i18n="logout" onclick="doLogout()">退出登录</button>
    <button class="theme-btn" id="theme-btn-admin" onclick="_toggleTheme()" title="切换主题" style="margin-left:8px"></button>
    <button class="lang-toggle" id="lang-btn-admin" onclick="toggleLangPage()" style="margin-left:4px">EN</button>
  </nav>

  <!-- Tab bar -->
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('stats',   this)"><i data-lucide="bar-chart-2" style="width:14px;height:14px"></i> <span data-i18n="tabStats">概览</span></button>
    <button class="tab-btn"        onclick="switchTab('generate', this)"><i data-lucide="key-round"  style="width:14px;height:14px"></i> <span data-i18n="tabGenerate">生成兑换码</span></button>
    <button class="tab-btn"        onclick="switchTab('codes',   this)"><i data-lucide="list"        style="width:14px;height:14px"></i> <span data-i18n="tabCodes">兑换码管理</span></button>
    <button class="tab-btn"        onclick="switchTab('settings', this)"><i data-lucide="settings"   style="width:14px;height:14px"></i> <span data-i18n="tabSettings">账号设置</span></button>
  </div>

  <div class="content">

    <!-- ═══════════ TAB: Stats ══════════════════════ -->
    <div id="tab-stats">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label" data-i18n="statUsers">注册用户</div>
          <div class="stat-val" id="s-users">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" data-i18n="statScans">总扫描次数</div>
          <div class="stat-val" id="s-scans">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" data-i18n="statActiveCodes">有效兑换码</div>
          <div class="stat-val" id="s-active">—</div>
          <div class="stat-sub" data-i18n="statActiveCodesHint">可继续兑换</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" data-i18n="statTotalUses">累计兑换次数</div>
          <div class="stat-val" id="s-uses">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" data-i18n="statTotalCodes">总码数</div>
          <div class="stat-val" id="s-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" data-i18n="statRevoked">已撤销</div>
          <div class="stat-val" id="s-revoked">—</div>
        </div>
      </div>
      <div class="refresh-row">
        <button class="btn btn-sm btn-ghost" onclick="loadStats()">🔄 <span data-i18n="btnRefresh">刷新数据</span></button>
      </div>
    </div>

    <!-- ═══════════ TAB: Generate ════════════════════ -->
    <div id="tab-generate" class="hidden">
      <div class="gen-layout">

        <!-- Form -->
        <div class="card">
          <div class="card-title" data-i18n="cardGenerate">生成兑换码</div>
          <div class="form-grid">
            <div class="field">
              <label data-i18n="labelCredits">Credits 数量</label>
              <input type="number" id="g-credits" value="10" min="1" max="10000">
              <div class="field-hint" data-i18n="hintCredits">每码赠送的扫描次数</div>
            </div>
            <div class="field">
              <label data-i18n="labelCount">生成数量</label>
              <input type="number" id="g-count" value="1" min="1" max="500">
              <div class="field-hint" data-i18n="hintCount">最多 500 个 / 次</div>
            </div>
            <div class="field">
              <label data-i18n="labelMaxUses">每码可用次数</label>
              <input type="number" id="g-maxuses" value="1" min="1" max="100000">
              <div class="field-hint" data-i18n="hintMaxUses">1 = 一次性；> 1 = 多人共享</div>
            </div>
            <div class="field">
              <label data-i18n="labelExpires">有效天数</label>
              <input type="number" id="g-expires" value="0" min="0">
              <div class="field-hint" data-i18n="hintExpires">0 = 永不过期</div>
            </div>
            <div class="field full">
              <label data-i18n="labelNote">备注</label>
              <input type="text" id="g-note" placeholder="可选，如：新用户福利、内测专属…">
            </div>
          </div>
          <div style="margin-top:18px">
            <button class="btn btn-full" id="gen-btn" onclick="doGenerate()" data-i18n="btnGenerate">生成兑换码</button>
          </div>
          <div class="err-msg" id="gen-err"></div>
        </div>

        <!-- Result -->
        <div class="card">
          <div class="card-title">
            <span data-i18n="cardResult">生成结果</span>
            <span id="gen-meta"></span>
          </div>
          <div class="result-area" id="result-area">
            <div class="result-empty" data-i18n="resultEmpty">生成的兑换码将显示在这里</div>
          </div>
          <div class="result-actions" id="result-actions" style="display:none">
            <button class="btn btn-sm btn-outline" onclick="copyAll()"><i data-lucide="copy" style="width:12px;height:12px"></i> <span data-i18n="btnCopyAll">复制全部</span></button>
            <button class="btn btn-sm btn-ghost"   onclick="exportTxt()"><i data-lucide="download" style="width:12px;height:12px"></i> <span data-i18n="btnExportTxt">导出 TXT</span></button>
          </div>
        </div>

      </div>
    </div><!-- tab-generate -->

    <!-- ═══════════ TAB: Code list ════════════════════ -->
    <div id="tab-codes" class="hidden">
      <div class="card">
        <div class="table-toolbar">
          <input class="search-input" id="code-search"
                 placeholder="搜索兑换码、备注…" oninput="filterCodes()">
          <select class="filter-sel" id="code-status" onchange="filterCodes()">
            <option value="all" data-i18n-opt="filterAll">全部状态</option>
            <option value="active" data-i18n-opt="filterActive">✅ 有效</option>
            <option value="used" data-i18n-opt="filterUsed">🟡 已用完</option>
            <option value="expired" data-i18n-opt="filterExpired">🔴 已过期</option>
            <option value="revoked" data-i18n-opt="filterRevoked">⬛ 已撤销</option>
          </select>
          <button class="btn btn-sm btn-ghost" onclick="loadCodes()">🔄 <span data-i18n="btnRefreshShort">刷新</span></button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th data-i18n="thCode">兑换码</th>
                <th data-i18n="thCredits">Credits</th>
                <th data-i18n="thUsage">使用情况</th>
                <th data-i18n="thStatus">状态</th>
                <th data-i18n="thExpiry">有效期</th>
                <th data-i18n="thNote">备注</th>
                <th data-i18n="thCreated">创建时间</th>
                <th data-i18n="thActions">操作</th>
              </tr>
            </thead>
            <tbody id="codes-tbody">
              <tr><td colspan="8" style="text-align:center;color:#94a3b8;padding:32px">
                请切换到此标签页加载数据
              </td></tr>
            </tbody>
          </table>
        </div>

        <div class="pagination">
          <span id="page-info"></span>
          <button class="page-btn" id="prev-btn" onclick="changePage(-1)" disabled>‹ <span data-i18n="btnPrev">上一页</span></button>
          <button class="page-btn" id="next-btn" onclick="changePage(1)"  disabled><span data-i18n="btnNext">下一页</span> ›</button>
        </div>
      </div>
    </div><!-- tab-codes -->

    <!-- ═══════════ TAB: Settings ══════════════════════ -->
    <div id="tab-settings" class="hidden">
      <div class="settings-grid">

        <!-- Change password -->
        <div class="card">
          <div class="card-title" style="display:flex;align-items:center;gap:7px"><i data-lucide="key-round" style="width:16px;height:16px;color:#2563eb"></i> <span data-i18n="cardChangePassword">修改密码</span></div>
          <div class="field">
            <label data-i18n="labelOldPassword">当前密码</label>
            <input type="password" id="cp-old" placeholder="••••••" autocomplete="current-password">
          </div>
          <div class="field">
            <label data-i18n="labelNewPassword">新密码</label>
            <input type="password" id="cp-new" placeholder="至少 6 位" autocomplete="new-password">
          </div>
          <div class="field">
            <label data-i18n="labelConfirmPassword">确认新密码</label>
            <input type="password" id="cp-confirm" placeholder="再次输入新密码" autocomplete="new-password"
                   onkeydown="if(event.key==='Enter')doChangePassword()">
          </div>
          <div class="err-msg" id="cp-err"></div>
          <button class="btn btn-full" id="cp-btn" onclick="doChangePassword()" style="margin-top:4px" data-i18n="btnChangePassword">
            修改密码
          </button>
        </div>

        <!-- Add admin -->
        <div class="card">
          <div class="card-title" data-i18n="cardAddAdmin">➕ 添加管理员</div>
          <div class="field">
            <label data-i18n="labelUsername">用户名</label>
            <input type="text" id="na-user" placeholder="至少 2 个字符" autocomplete="off">
          </div>
          <div class="field">
            <label data-i18n="labelPassword">密码</label>
            <input type="password" id="na-pass" placeholder="至少 6 位" autocomplete="new-password">
          </div>
          <div class="field">
            <label data-i18n="labelConfirmPwd">确认密码</label>
            <input type="password" id="na-confirm" placeholder="再次输入密码" autocomplete="new-password"
                   onkeydown="if(event.key==='Enter')doAddAdmin()">
          </div>
          <div class="err-msg" id="na-err"></div>
          <button class="btn btn-full" id="na-btn" onclick="doAddAdmin()" style="margin-top:4px" data-i18n="btnAddAdmin">
            添加管理员
          </button>
        </div>

        <!-- Admin list -->
        <div class="card full-col">
          <div class="card-title">
            <span data-i18n="cardAdminList">👥 管理员列表</span>
            <button class="btn btn-sm btn-ghost" onclick="loadAdmins()">🔄 <span data-i18n="btnRefreshShort">刷新</span></button>
          </div>
          <div id="acct-list">
            <div style="color:#94a3b8;font-size:.87em;padding:16px 0;text-align:center">加载中…</div>
          </div>
        </div>

      </div>
    </div><!-- tab-settings -->

  </div><!-- .content -->
</div><!-- #admin-panel -->

<div class="toast" id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────
let adminToken  = localStorage.getItem('admin_token') || '';
let adminName   = localStorage.getItem('admin_name')  || 'admin';
let allCodes    = [];
let filtered    = [];
const PAGE      = 20;
let page        = 0;
let lastCodes   = [];

// ── Boot ──────────────────────────────────────────────────
(function init() {
  if (adminToken) {
    setNavUser(adminName);
    showPanel(); loadStats(); loadMe();
  }
})();

// ── Auth ──────────────────────────────────────────────────
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-err');
  const btn  = document.getElementById('login-btn');
  if (!user || !pass) { err.textContent = '请输入用户名和密码'; return; }
  err.textContent = '';
  btn.disabled = true; btn.textContent = '登录中…';
  try {
    const r = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const d = await r.json();
    if (d.ok && d.token) {
      adminToken = d.token;
      localStorage.setItem('admin_token', adminToken);
      showPanel(); loadStats(); loadMe();
    } else {
      err.textContent = d.error || '登录失败';
    }
  } catch (_) { err.textContent = '网络错误，请重试'; }
  btn.disabled = false; btn.textContent = '登录';
}

function showPanel() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-panel').classList.remove('hidden');
}

function doLogout() {
  adminToken = ''; adminName = 'admin';
  localStorage.removeItem('admin_token');
  localStorage.removeItem('admin_name');
  allCodes = []; filtered = []; lastCodes = [];
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('admin-panel').classList.add('hidden');
  document.getElementById('login-pass').value = '';
  document.getElementById('login-err').textContent = '';
}

function setNavUser(name) {
  adminName = name;
  localStorage.setItem('admin_name', name);
  const initial = (name || 'A')[0].toUpperCase();
  setText('nav-avatar', initial);
  setText('nav-uname', name);
}

async function loadMe() {
  try {
    const d = await api('/admin/me');
    if (d.username) setNavUser(d.username);
  } catch (_) {}
}

// ── Tab switching ──────────────────────────────────────────
function switchTab(name, btn) {
  ['stats', 'generate', 'codes', 'settings'].forEach(t =>
    document.getElementById('tab-' + t).classList.add('hidden')
  );
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.remove('hidden');
  btn.classList.add('active');
  if (name === 'stats')    loadStats();
  if (name === 'codes')    loadCodes();
  if (name === 'settings') loadAdmins();
}

// ── API helper ────────────────────────────────────────────
async function api(path, opts = {}) {
  opts.headers = { ...(opts.headers || {}), Authorization: `Bearer ${adminToken}` };
  const r = await fetch(path, opts);
  if (r.status === 403) { toast('会话已过期，请重新登录'); doLogout(); throw new Error('403'); }
  return r.json();
}

// ── Stats ─────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await api('/admin/stats');
    setText('s-users',   fmt(d.users));
    setText('s-scans',   fmt(d.total_scans));
    setText('s-active',  fmt(d.codes_active));
    setText('s-uses',    fmt(d.code_uses_total));
    setText('s-total',   fmt(d.codes_total));
    setText('s-revoked', fmt(d.codes_revoked));
  } catch (_) {}
}

// ── Generate codes ────────────────────────────────────────
async function doGenerate() {
  const credits  = parseInt(document.getElementById('g-credits').value)  || 10;
  const count    = parseInt(document.getElementById('g-count').value)    || 1;
  const maxUses  = parseInt(document.getElementById('g-maxuses').value)  || 1;
  const expires  = parseInt(document.getElementById('g-expires').value)  || 0;
  const note     = document.getElementById('g-note').value.trim();
  const btn      = document.getElementById('gen-btn');
  const err      = document.getElementById('gen-err');
  err.textContent = '';

  if (credits < 1 || credits > 10000) { err.textContent = 'Credits 须在 1–10000 之间'; return; }
  if (count   < 1 || count   > 500)   { err.textContent = '数量须在 1–500 之间'; return; }

  btn.disabled = true; btn.textContent = '生成中…';
  try {
    const q = new URLSearchParams({ credits, count, max_uses: maxUses, expires_days: expires, note });
    const d = await api(`/admin/generate-codes?${q}`, { method: 'POST' });
    if (d.codes) {
      lastCodes = d.codes;
      renderResult(d);
      toast(`✅ ${LA().generateSuccess} (${d.count})`);
    } else {
      err.textContent = d.error || LA().generateFail;
    }
  } catch (e) { if (e.message !== '403') err.textContent = '网络错误，请重试'; }
  btn.disabled = false; btn.textContent = LA().btnGenerate;
}

function renderResult(d) {
  const area    = document.getElementById('result-area');
  const meta    = document.getElementById('gen-meta');
  const actions = document.getElementById('result-actions');
  const parts   = [];
  if (d.credits_each)              parts.push(`${d.credits_each} Credits`);
  if (d.max_uses > 1)              parts.push(`${d.max_uses} ${LA().usersPerCode || 'users/code'}`);
  if (d.expires_at)                parts.push(`${LA().expiresOn || 'Expires'} ${d.expires_at.slice(0,10)}`);
  else                             parts.push(LA().never);
  meta.textContent = parts.join('　·　');

  area.innerHTML = d.codes.map(c => `
    <div class="code-item">
      <span class="code-text">${c}</span>
      <button class="copy-btn" onclick="copySingle(this,'${c}')">${LA().btnCopy}</button>
    </div>`).join('');
  actions.style.display = 'flex';
}

function copySingle(btn, code) {
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = LA().copySuccess; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = LA().btnCopy; btn.classList.remove('copied'); }, 1500);
  });
}

function copyAll() {
  navigator.clipboard.writeText(lastCodes.join('\n'))
    .then(() => toast(`${LA().copySuccess} (${lastCodes.length})`));
}

function exportTxt() {
  const blob = new Blob([lastCodes.join('\n')], { type: 'text/plain' });
  const a    = Object.assign(document.createElement('a'), {
    href:     URL.createObjectURL(blob),
    download: `codes_${new Date().toISOString().slice(0,10)}.txt`,
  });
  a.click();
}

// ── Code list ─────────────────────────────────────────────
async function loadCodes() {
  const tbody = document.getElementById('codes-tbody');
  tbody.innerHTML = `<tr><td colspan="8"
    style="text-align:center;color:#94a3b8;padding:32px">${LA().loading}</td></tr>`;
  try {
    const d = await api('/admin/codes?limit=500');
    allCodes = d.codes || [];
    filterCodes();
  } catch (e) {
    if (e.message !== '403')
      tbody.innerHTML = `<tr><td colspan="8"
        style="text-align:center;color:#dc2626;padding:32px">加载失败，请刷新重试</td></tr>`;
  }
}

function codeStatus(r) {
  if (r.is_revoked) return 'revoked';
  if (r.expires_at && r.expires_at < new Date().toISOString()) return 'expired';
  if (r.uses_count >= r.max_uses) return 'used';
  return 'active';
}

function filterCodes() {
  const q  = (document.getElementById('code-search').value || '').toUpperCase();
  const st = document.getElementById('code-status').value;
  filtered = allCodes.filter(r => {
    if (st !== 'all' && codeStatus(r) !== st) return false;
    if (q && !r.code.includes(q) && !(r.note || '').toUpperCase().includes(q)) return false;
    return true;
  });
  page = 0;
  renderPage();
}

function renderPage() {
  const tbody  = document.getElementById('codes-tbody');
  const start  = page * PAGE;
  const slice  = filtered.slice(start, start + PAGE);
  const total  = filtered.length;
  const LABEL  = { active: LA().statusActive, used: LA().statusUsedUp, expired: LA().statusExpired, revoked: LA().statusRevoked };
  const CLS    = { active: 'badge-active', used: 'badge-used',
                   expired: 'badge-expired', revoked: 'badge-revoked' };

  if (!slice.length) {
    tbody.innerHTML = `<tr><td colspan="8"
      style="text-align:center;color:#94a3b8;padding:32px">${LA().noData}</td></tr>`;
  } else {
    tbody.innerHTML = slice.map(r => {
      const st      = codeStatus(r);
      const expiry  = r.expires_at ? r.expires_at.slice(0, 10) : LA().statusPermanent;
      const created = r.created_at ? r.created_at.slice(0, 16).replace('T', ' ') : '—';
      const note    = r.note || '—';
      const canRevoke = st === 'active';
      return `<tr>
        <td>
          <span class="code-cell">${fmtCode(r.code)}</span>
          <button class="copy-btn" style="margin-left:6px"
                  onclick="copyCode('${r.code}')">${LA().btnCopy}</button>
        </td>
        <td>${r.credits}</td>
        <td>${r.uses_count} / ${r.max_uses}</td>
        <td><span class="badge ${CLS[st]}">${LABEL[st]}</span></td>
        <td>${expiry}</td>
        <td style="max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
            title="${note}">${note}</td>
        <td>${created}</td>
        <td>${canRevoke
          ? `<button class="btn btn-sm btn-danger" onclick="revokeCode('${r.code}',this)">${LA().btnRevoke}</button>`
          : '<span style="color:#cbd5e1">—</span>'
        }</td>
      </tr>`;
    }).join('');
  }

  setText('page-info', total
    ? `第 ${start + 1}–${Math.min(start + PAGE, total)} 条，共 ${total} 条`
    : '无结果');
  document.getElementById('prev-btn').disabled = page === 0;
  document.getElementById('next-btn').disabled = start + PAGE >= total;
}

function changePage(d) { page += d; renderPage(); }

function copyCode(code) {
  navigator.clipboard.writeText(fmtCode(code)).then(() => toast(LA().copySuccess));
}

async function revokeCode(code, btn) {
  if (!confirm(`确认撤销兑换码 ${fmtCode(code)}？撤销后不可恢复。`)) return;
  btn.disabled = true; btn.textContent = '撤销中…';
  try {
    const d = await api(`/admin/codes/${encodeURIComponent(code)}/revoke`, { method: 'POST' });
    if (d.ok) {
      toast(LA().revokeSuccess);
      const row = allCodes.find(r => r.code === code);
      if (row) row.is_revoked = 1;
      filterCodes();
    } else {
      btn.disabled = false; btn.textContent = LA().btnRevoke;
      toast(d.error || LA().revokeFail);
    }
  } catch (e) {
    btn.disabled = false; btn.textContent = LA().btnRevoke;
    if (e.message !== '403') toast('网络错误');
  }
}

// ── Account settings ──────────────────────────────────────
async function doChangePassword() {
  const oldPw  = document.getElementById('cp-old').value;
  const newPw  = document.getElementById('cp-new').value;
  const confirm = document.getElementById('cp-confirm').value;
  const err    = document.getElementById('cp-err');
  const btn    = document.getElementById('cp-btn');
  err.textContent = '';
  if (!oldPw || !newPw)     { err.textContent = '请填写所有字段'; return; }
  if (newPw.length < 6)     { err.textContent = '新密码至少 6 位'; return; }
  if (newPw !== confirm)    { err.textContent = '两次输入的新密码不一致'; return; }
  btn.disabled = true; btn.textContent = '修改中…';
  try {
    const d = await api('/admin/change-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ current_password: oldPw, new_password: newPw })
    });
    if (d.ok) {
      toast(`✅ ${LA().pwdChangeSuccess}`);
      document.getElementById('cp-old').value = '';
      document.getElementById('cp-new').value = '';
      document.getElementById('cp-confirm').value = '';
    } else {
      err.textContent = d.error || LA().pwdChangeFail;
    }
  } catch (e) { if (e.message !== '403') err.textContent = '网络错误'; }
  btn.disabled = false; btn.textContent = LA().btnChangePassword;
}

async function doAddAdmin() {
  const user    = document.getElementById('na-user').value.trim();
  const pass    = document.getElementById('na-pass').value;
  const confirm = document.getElementById('na-confirm').value;
  const err     = document.getElementById('na-err');
  const btn     = document.getElementById('na-btn');
  err.textContent = '';
  if (!user || !pass)       { err.textContent = '请填写所有字段'; return; }
  if (user.length < 2)      { err.textContent = '用户名至少 2 个字符'; return; }
  if (pass.length < 6)      { err.textContent = '密码至少 6 位'; return; }
  if (pass !== confirm)     { err.textContent = '两次输入的密码不一致'; return; }
  btn.disabled = true; btn.textContent = '添加中…';
  try {
    const q = new URLSearchParams({ username: user, password: pass });
    const d = await api(`/admin/accounts?${q}`, { method: 'POST' });
    if (d.ok) {
      toast(`✅ 管理员 ${user} 已添加`);
      document.getElementById('na-user').value = '';
      document.getElementById('na-pass').value = '';
      document.getElementById('na-confirm').value = '';
      loadAdmins();
    } else {
      err.textContent = d.error || '添加失败';
    }
  } catch (e) { if (e.message !== '403') err.textContent = '网络错误'; }
  btn.disabled = false; btn.textContent = '添加管理员';
}

async function loadAdmins() {
  const container = document.getElementById('acct-list');
  container.innerHTML = '<div style="color:#94a3b8;font-size:.87em;padding:16px 0;text-align:center">' + LA().loading + '</div>';
  try {
    const d = await api('/admin/accounts');
    const accounts = d.accounts || [];
    if (!accounts.length) {
      container.innerHTML = '<div style="color:#94a3b8;font-size:.87em;padding:16px 0;text-align:center">' + LA().noData + '</div>';
      return;
    }
    container.innerHTML = accounts.map(a => {
      const initial  = (a.username || 'A')[0].toUpperCase();
      const isSelf   = a.username === adminName;
      const created  = (a.created_at || '').slice(0, 10);
      const metaParts = [`创建于 ${created || '—'}`];
      if (a.is_super) metaParts.push('超级管理员');
      if (isSelf)     metaParts.push('(当前账号)');
      const canDelete = !a.is_super && !isSelf;
      return `<div class="acct-row">
        <div class="acct-avatar">${initial}</div>
        <div class="acct-info">
          <div class="acct-name">
            ${a.username}
            ${a.is_super ? '<span class="badge-super">超级</span>' : ''}
          </div>
          <div class="acct-meta">${metaParts.join(' · ')}</div>
        </div>
        ${canDelete
          ? `<button class="btn btn-sm btn-danger" onclick="deleteAdmin('${a.username}',this)">删除</button>`
          : '<span style="color:#e2e8f0;font-size:.8em">—</span>'}
      </div>`;
    }).join('');
  } catch (e) {
    if (e.message !== '403')
      container.innerHTML = '<div style="color:#dc2626;font-size:.87em;padding:16px 0;text-align:center">加载失败</div>';
  }
}

async function deleteAdmin(username, btn) {
  if (!confirm(`确认删除管理员账号「${username}」？此操作不可恢复。`)) return;
  btn.disabled = true; btn.textContent = '删除中…';
  try {
    const d = await api(`/admin/accounts/${encodeURIComponent(username)}`, { method: 'DELETE' });
    if (d.ok) { toast(`已删除账号 ${username}`); loadAdmins(); }
    else      { btn.disabled = false; btn.textContent = '删除'; toast(d.error || '删除失败'); }
  } catch (e) {
    btn.disabled = false; btn.textContent = '删除';
    if (e.message !== '403') toast('网络错误');
  }
}

function fmtCode(code) {
  // Display XXXX-XXXX-XXXX; legacy 12-char no-dash codes get dashes added
  const c = code.replace(/-/g, '');
  if (c.length === 12) return `${c.slice(0,4)}-${c.slice(4,8)}-${c.slice(8)}`;
  return code;
}

function fmt(n) { return n == null ? '—' : Number(n).toLocaleString('zh-CN'); }

function setText(id, v) {
  const el = document.getElementById(id);
  if (el) el.textContent = v;
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

let _langAdmin = localStorage.getItem('lang') || 'zh';
function LA() { return LANG_ADMIN[_langAdmin] || LANG_ADMIN.zh; }
function applyI18nAdmin() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (LA()[k] !== undefined) el.textContent = LA()[k];
  });
  document.querySelectorAll('[data-i18n-opt]').forEach(el => {
    const k = el.getAttribute('data-i18n-opt');
    if (LA()[k] !== undefined) {
      // Preserve leading emoji prefix if present
      const cur = el.textContent;
      const emojiMatch = cur.match(/^[\u{1F000}-\u{1FFFF}\u{2600}-\u{27FF}\u{2B00}-\u{2BFF}⬛✅🟡🔴]\s*/u);
      el.textContent = (emojiMatch ? emojiMatch[0] : '') + LA()[k];
    }
  });
  const searchEl = document.getElementById('code-search');
  if (searchEl) searchEl.placeholder = LA().searchCodePh || searchEl.placeholder;
  document.querySelectorAll('.lang-toggle').forEach(b => b.textContent = LA().langBtn);
}
function toggleLangPage() {
  _langAdmin = _langAdmin === 'zh' ? 'en' : 'zh';
  localStorage.setItem('lang', _langAdmin);
  document.documentElement.lang = _langAdmin === 'zh' ? 'zh-CN' : 'en';
  applyI18nAdmin();
}
