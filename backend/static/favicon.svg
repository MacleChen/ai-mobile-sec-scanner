<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <!-- Shield gradient: bright blue top → deep navy bottom -->
    <linearGradient id="sg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <!-- Scan-line glow filter -->
    <filter id="glow" x="-30%" y="-80%" width="160%" height="360%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Dark rounded-square background ── -->
  <rect width="32" height="32" rx="7" fill="#0a1628"/>

  <!-- ── Shield (security) ── -->
  <!-- Outer filled shape -->
  <path d="M16 3 L28 8 L28 18 C28 24.5 22.5 29 16 31 C9.5 29 4 24.5 4 18 L4 8 Z"
        fill="url(#sg)"/>
  <!-- Inner highlight rim -->
  <path d="M16 3 L28 8 L28 18 C28 24.5 22.5 29 16 31 C9.5 29 4 24.5 4 18 L4 8 Z"
        fill="none" stroke="#64B5F6" stroke-width="0.8" opacity="0.7"/>

  <!-- ── Smartphone body (white, centered inside shield) ── -->
  <!-- Phone chassis -->
  <rect x="11.5" y="8" width="9" height="15" rx="1.8" fill="#ECF0F1"/>
  <!-- Phone screen (dark glass) -->
  <rect x="12.8" y="10" width="6.4" height="10" fill="#0a1628"/>
  <!-- Top speaker slot -->
  <rect x="14.2" y="8.8" width="3.6" height="0.7" rx="0.35" fill="#BDC3C7"/>
  <!-- Home-button circle -->
  <circle cx="16" cy="21.5" r="0.9" fill="#BDC3C7"/>

  <!-- ── Cyan scan line (AI scanning) ── -->
  <!-- Glow halo -->
  <rect x="12.5" y="14.3" width="7" height="1.8" rx="0.9"
        fill="#00E5FF" opacity="0.35" filter="url(#glow)"/>
  <!-- Main beam -->
  <rect x="12.5" y="14.6" width="7" height="1.2" rx="0.6" fill="#00E5FF"/>
  <!-- Left terminus dot -->
  <circle cx="12.5" cy="15.2" r="0.9" fill="#00E5FF" filter="url(#glow)"/>
  <!-- Right terminus dot -->
  <circle cx="19.5" cy="15.2" r="0.9" fill="#00E5FF" filter="url(#glow)"/>
</svg>
