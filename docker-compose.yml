version: '3.8'

services:
  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    ports:
      - "8000:8000"
    volumes:
      - mobsf-data:/home/mobsf/.MobSF
    environment:
      - MOBSF_API_KEY=${MOBSF_API_KEY}

  backend:
    build: ./backend
    ports:
      - "8081:8080"
    depends_on:
      - mobsf
    volumes:
      - scanner-data:/app/data
    environment:
      - MOBSF_URL=http://mobsf:8000
      - MOBSF_API_KEY=${MOBSF_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ADMIN_KEY=${ADMIN_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - CRYPTOMUS_MERCHANT=${CRYPTOMUS_MERCHANT}
      - CRYPTOMUS_API_KEY=${CRYPTOMUS_API_KEY}
      - SITE_URL=${SITE_URL}
      - EPAY_URL=${EPAY_URL}
      - EPAY_PID=${EPAY_PID}
      - EPAY_KEY=${EPAY_KEY}

volumes:
  mobsf-data:
  scanner-data:
